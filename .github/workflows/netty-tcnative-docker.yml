name: Netty tcnative Docker comparison

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  native-tls:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: alpine
            image: eclipse-temurin:17-jdk-alpine
            expected-openssl: "false"
          - name: noble
            image: eclipse-temurin:17-jdk-noble
            expected-openssl: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Maven tests inside ${{ matrix.image }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/m2" build/native-tls

          docker run --rm \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --volume "$RUNNER_TEMP/m2:/root/.m2" \
            --workdir /workspace \
            "${{ matrix.image }}" \
            sh -c 'chmod +x ./mvnw && ./mvnw -B -Ddemo.expectedOpenSslAvailable=${{ matrix.expected-openssl }} -Dsurefire.useFile=false test' \
            | tee "build/native-tls/${{ matrix.name }}.log"

      - name: Summarize native TLS result
        if: always()
        run: |
          {
            echo "### ${{ matrix.name }}"
            echo
            echo "- Image: \`${{ matrix.image }}\`"
            echo "- Expected OpenSSL-backed Netty TLS: \`${{ matrix.expected-openssl }}\`"
            echo
            echo '```text'
            if [ -f "build/native-tls/${{ matrix.name }}.log" ]; then
              grep -E '^(java.version|java.vendor|os.name|os.arch|azure.http.client|netty.openssl)' "build/native-tls/${{ matrix.name }}.log" || true
            else
              echo "No test log was produced."
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload native TLS log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-tls-${{ matrix.name }}
          path: build/native-tls/${{ matrix.name }}.log
          if-no-files-found: ignore

  azure-netty-performance:
    name: Azure Netty TLS performance
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Alpine benchmark
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/m2-performance" build/native-tls

          docker run --rm \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --volume "$RUNNER_TEMP/m2-performance:/root/.m2" \
            --workdir /workspace \
            eclipse-temurin:17-jdk-alpine \
            sh -c 'chmod +x ./mvnw && ./mvnw -B -Dtest=NettyTcnativeBoringSslPerformanceTest -Ddemo.benchmark.enabled=true -Ddemo.benchmark.output=build/native-tls/alpine-benchmark.json -Dsurefire.useFile=false test' \
            | tee build/native-tls/alpine-benchmark.log

      - name: Run Noble benchmark
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/m2-performance" build/native-tls

          docker run --rm \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --volume "$RUNNER_TEMP/m2-performance:/root/.m2" \
            --workdir /workspace \
            eclipse-temurin:17-jdk-noble \
            sh -c 'chmod +x ./mvnw && ./mvnw -B -Dtest=NettyTcnativeBoringSslPerformanceTest -Ddemo.benchmark.enabled=true -Ddemo.benchmark.output=build/native-tls/noble-benchmark.json -Dsurefire.useFile=false test' \
            | tee build/native-tls/noble-benchmark.log

      - name: Compare benchmark results
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import textwrap

          alpine = json.loads(pathlib.Path("build/native-tls/alpine-benchmark.json").read_text())
          noble = json.loads(pathlib.Path("build/native-tls/noble-benchmark.json").read_text())

          def rps(result, section):
              return float(result[section]["requestsPerSecond"])

          handshake_speedup = rps(noble, "handshakeHeavy") / rps(alpine, "handshakeHeavy")
          keepalive_speedup = rps(noble, "keepAlive") / rps(alpine, "keepAlive")

          summary = pathlib.Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          summary.write_text(textwrap.dedent(f"""\
          ### Azure SDK Netty TLS benchmark

          | Metric | Alpine | Noble | Noble speedup |
          | --- | ---: | ---: | ---: |
          | OpenSSL available | `{alpine["nettyOpenSslAvailable"]}` | `{noble["nettyOpenSslAvailable"]}` | |
          | Netty SSL provider | `{alpine["nettySslProvider"]}` | `{noble["nettySslProvider"]}` | |
          | Handshake-heavy requests/sec | {rps(alpine, "handshakeHeavy"):.2f} | {rps(noble, "handshakeHeavy"):.2f} | {handshake_speedup:.2f}x |
          | Keep-alive requests/sec | {rps(alpine, "keepAlive"):.2f} | {rps(noble, "keepAlive"):.2f} | {keepalive_speedup:.2f}x |

          The handshake-heavy benchmark opens a new TLS connection for every Azure SDK Netty request. The keep-alive benchmark reuses one TLS connection.
          """))

          print(f"handshake_speedup={handshake_speedup:.2f}x")
          print(f"keepalive_speedup={keepalive_speedup:.2f}x")

          if handshake_speedup < 1.20:
              raise SystemExit(f"Noble handshake-heavy benchmark was only {handshake_speedup:.2f}x faster than Alpine")
          PY

      - name: Upload performance logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azure-netty-performance
          path: |
            build/native-tls/*-benchmark.json
            build/native-tls/*-benchmark.log
          if-no-files-found: ignore

  azure-app-configuration-netty-regression:
    name: Azure App Configuration Netty regression
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Azure App Configuration SDK benchmarks
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/m2-appconfig" build/native-tls

          run_case() {
            scenario="$1"
            image="$2"
            netty_version="$3"
            tcnative_version="$4"

            echo "Running $scenario on $image with Netty $netty_version and netty-tcnative $tcnative_version"
            docker run --rm \
              --volume "$GITHUB_WORKSPACE:/workspace" \
              --volume "$RUNNER_TEMP/m2-appconfig:/root/.m2" \
              --workdir /workspace \
              "$image" \
              sh -c "chmod +x ./mvnw && ./mvnw -B -Dnetty.version=$netty_version -Dnetty-tcnative.version=$tcnative_version -Dtest=AzureAppConfigurationNettyPerformanceTest -Ddemo.benchmark.enabled=true -Ddemo.benchmark.scenario=$scenario -Ddemo.docker.image=$image -Ddemo.benchmark.handshakeWarmupRequests=10 -Ddemo.benchmark.handshakeRequests=100 -Ddemo.benchmark.keepAliveWarmupRequests=50 -Ddemo.benchmark.keepAliveRequests=300 -Ddemo.benchmark.output=build/native-tls/appconfig-$scenario.json -Dsurefire.useFile=false test" \
              | tee "build/native-tls/appconfig-$scenario.log"
          }

          run_case "noble-netty-4.1.132-tcnative-2.0.75" "eclipse-temurin:17-jdk-noble" "4.1.132.Final" "2.0.75.Final"
          run_case "noble-netty-4.1.133-tcnative-2.0.75" "eclipse-temurin:17-jdk-noble" "4.1.133.Final" "2.0.75.Final"
          run_case "noble-netty-4.1.133-tcnative-2.0.77" "eclipse-temurin:17-jdk-noble" "4.1.133.Final" "2.0.77.Final"
          run_case "alpine-netty-4.1.132-tcnative-2.0.75" "eclipse-temurin:17-jdk-alpine" "4.1.132.Final" "2.0.75.Final"
          run_case "alpine-netty-4.1.133-tcnative-2.0.75" "eclipse-temurin:17-jdk-alpine" "4.1.133.Final" "2.0.75.Final"
          run_case "alpine-netty-4.1.133-tcnative-2.0.77" "eclipse-temurin:17-jdk-alpine" "4.1.133.Final" "2.0.77.Final"

      - name: Summarize Azure App Configuration SDK benchmarks
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re
          import textwrap

          result_paths = [
              pathlib.Path("build/native-tls/appconfig-noble-netty-4.1.132-tcnative-2.0.75.json"),
              pathlib.Path("build/native-tls/appconfig-noble-netty-4.1.133-tcnative-2.0.75.json"),
              pathlib.Path("build/native-tls/appconfig-noble-netty-4.1.133-tcnative-2.0.77.json"),
              pathlib.Path("build/native-tls/appconfig-alpine-netty-4.1.132-tcnative-2.0.75.json"),
              pathlib.Path("build/native-tls/appconfig-alpine-netty-4.1.133-tcnative-2.0.75.json"),
              pathlib.Path("build/native-tls/appconfig-alpine-netty-4.1.133-tcnative-2.0.77.json"),
          ]

          rows = []
          for path in result_paths:
              if not path.exists():
                  rows.append({"path": path, "missing": True})
                  continue
              result = json.loads(path.read_text())
              scenario = result["benchmarkScenario"]
              image = result["dockerImage"]
              image_family = "noble" if "noble" in image else "alpine"
              netty = result["nettyCommonVersion"]
              tcnative = result["nettyTcnativeVersion"]
              rows.append({
                  "path": path,
                  "missing": False,
                  "scenario": scenario,
                  "image": image_family,
                  "netty": netty,
                  "tcnative": tcnative,
                  "openssl": result["nettyOpenSslAvailable"],
                  "provider": result["nettySslProvider"],
                  "handshake_rps": float(result["appConfigurationHandshakeHeavy"]["requestsPerSecond"]),
                  "keepalive_rps": float(result["appConfigurationKeepAlive"]["requestsPerSecond"]),
              })

          baselines = {
              row["image"]: row for row in rows
              if not row["missing"] and row["netty"] == "4.1.132.Final" and row["tcnative"] == "2.0.75.Final"
          }

          def relative(row, metric):
              baseline = baselines.get(row["image"])
              if baseline is None:
                  return ""
              return f'{row[metric] / baseline[metric]:.2f}x'

          table = [
              "| Image | Netty | tcnative | OpenSSL | Provider | App Config new TLS req/s | vs 4.1.132 | App Config keep-alive req/s | vs 4.1.132 |",
              "| --- | --- | --- | ---: | --- | ---: | ---: | ---: | ---: |",
          ]
          for row in rows:
              if row["missing"]:
                  scenario = re.sub(r"^appconfig-|\.json$", "", row["path"].name)
                  table.append(f"| `{scenario}` | missing | missing | | | | | | |")
                  continue
              table.append(
                  f'| {row["image"]} | `{row["netty"]}` | `{row["tcnative"]}` | '
                  f'`{row["openssl"]}` | `{row["provider"]}` | '
                  f'{row["handshake_rps"]:.2f} | {relative(row, "handshake_rps")} | '
                  f'{row["keepalive_rps"]:.2f} | {relative(row, "keepalive_rps")} |'
              )

          summary = pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary.write_text(textwrap.dedent("""\
          ### Azure App Configuration SDK Netty regression

          This benchmark uses the real `azure-data-appconfiguration` synchronous client against a local HTTPS App Configuration-shaped endpoint. No Azure account is required; the measurement isolates Azure SDK + Netty + TLS behavior.

          """) + "\n".join(table) + "\n\n"
          "Values below `1.00x` are slower than the same-image Netty `4.1.132.Final` baseline.\n")
          PY

      - name: Upload Azure App Configuration benchmark logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azure-app-configuration-netty-regression
          path: |
            build/native-tls/appconfig-*.json
            build/native-tls/appconfig-*.log
          if-no-files-found: ignore
